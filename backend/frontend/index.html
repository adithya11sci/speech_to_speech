<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avatar Gen - Voice Assistant</title>
    <script src="https://unpkg.com/livekit-client@latest/dist/livekitclient.umd.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            max-width: 500px;
            width: 100%;
            text-align: center;
        }
        h1 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #818cf8, #38bdf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .subtitle {
            color: #94a3b8;
            margin-bottom: 2rem;
        }
        .status {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 15px 25px;
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: 1rem;
        }
        .status.disconnected { border: 1px solid #475569; }
        .status.connecting { border: 1px solid #eab308; color: #eab308; }
        .status.connected { border: 1px solid #22c55e; color: #22c55e; }
        .status.error { border: 1px solid #ef4444; color: #ef4444; }
        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: currentColor;
            animation: pulse 1.4s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.25; }
        }
        .btn {
            background: linear-gradient(135deg, #818cf8, #6366f1);
            border: none;
            color: white;
            padding: 15px 40px;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 12px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin: 10px;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(129, 140, 248, 0.3);
        }
        .btn:disabled {
            background: #475569;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        .btn.end {
            background: linear-gradient(135deg, #ef4444, #dc2626);
        }
        .logs {
            margin-top: 20px;
            padding: 15px;
            background: rgba(0,0,0,0.3);
            border-radius: 8px;
            text-align: left;
            max-height: 200px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 0.85rem;
            color: #94a3b8;
        }
        .log-entry {
            margin: 5px 0;
        }
        .log-entry.user { color: #38bdf8; }
        .log-entry.assistant { color: #22c55e; }
        .log-entry.system { color: #f59e0b; }
        .log-entry.error { color: #ef4444; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Avatar Gen</h1>
        <p class="subtitle">Real-time Voice Assistant</p>
        
        <div id="status" class="status disconnected">
            <span class="dot"></span>
            <span>Disconnected</span>
        </div>
        
        <div>
            <button id="startBtn" class="btn" onclick="startCall()">Start Conversation</button>
            <button id="endBtn" class="btn end" onclick="endCall()" disabled>End</button>
        </div>
        
        <div id="logs" class="logs"></div>
    </div>

    <script>
        const LIVEKIT_URL = 'ws://localhost:7880';
        
        let room = null;
        let audioTrack = null;
        let isSpeaking = false;
        
        function log(message, type = 'system') {
            const logs = document.getElementById('logs');
            const entry = document.createElement('div');
            entry.className = `log-entry ${type}`;
            entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            logs.appendChild(entry);
            logs.scrollTop = logs.scrollHeight;
        }
        
        function setStatus(status, text) {
            const statusEl = document.getElementById('status');
            statusEl.className = `status ${status}`;
            statusEl.querySelector('span:last-child').textContent = text;
        }
        
        async function startCall() {
            const startBtn = document.getElementById('startBtn');
            const endBtn = document.getElementById('endBtn');
            
            startBtn.disabled = true;
            setStatus('connecting', 'Connecting...');
            
            try {
                const token = await getToken();
                
                room = new LivekitClient.Room({
                    adaptiveStream: true,
                    dynacast: true,
                });
                
                room.on('connected', () => {
                    setStatus('connected', 'Connected - Speak now!');
                    endBtn.disabled = false;
                    log('Connected to room', 'system');
                });
                
                room.on('disconnected', () => {
                    setStatus('disconnected', 'Disconnected');
                    startBtn.disabled = false;
                    endBtn.disabled = true;
                    log('Disconnected', 'system');
                });
                
                room.on('trackSubscribed', (track, publication, participant) => {
                    if (track.kind === LivekitClient.Track.Kind.Audio) {
                        track.play();
                        log('Receiving audio', 'system');
                    }
                });
                
                room.on('trackUnsubscribed', (track, publication, participant) => {
                    track.stop();
                });
                
                await room.connect(LIVEKIT_URL, token);
                
                const audioTracks = await LivekitClient.createLocalTracks({ audio: true, video: false });
                audioTrack = audioTracks.find(t => t.kind === LivekitClient.Track.Kind.Audio);
                
                if (audioTrack) {
                    await room.publishTrack(audioTrack);
                    log('Microphone published', 'system');
                }
                
            } catch (error) {
                log(`Error: ${error.message}`, 'error');
                setStatus('error', 'Connection failed');
                startBtn.disabled = false;
            }
        }
        
        async function endCall() {
            if (room) {
                await room.disconnect();
                room = null;
            }
            
            document.getElementById('startBtn').disabled = false;
            document.getElementById('endBtn').disabled = true;
            setStatus('disconnected', 'Disconnected');
            log('Call ended', 'system');
        }
        
        async function getToken() {
            const response = await fetch('/get-token', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ roomName: 'voice-room', identity: 'user' })
            });
            
            if (!response.ok) {
                throw new Error('Failed to get token');
            }
            
            const data = await response.json();
            return data.token;
        }
        
        log('Ready to connect', 'system');
    </script>
</body>
</html>
